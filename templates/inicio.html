<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>WeSafe — Navegação Segura</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

<style>
    html, body { overflow: hidden; height: 100%; }
    #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
    .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
    .mapboxgl-ctrl-bottom-right { bottom: 6px !important; right: 6px !important; }

    /* ---------- Painéis flutuantes ---------- */
    .floating-panel {
        position: absolute; left: 0; right: 0; width: 100%; max-width: 560px; margin: 0 auto;
        padding: 14px 16px 18px; background: var(--card); backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); box-shadow: var(--shadow);
        z-index: 20; transition: transform .45s cubic-bezier(.21,.87,.35,1), opacity .25s ease;
    }
    .floating-panel.hidden-panel { opacity: 0; pointer-events: none; }

    /* ---------- Top bar de gamificação ---------- */
    .top-bar {
        top: 0; border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        padding: max(12px, env(safe-area-inset-top)) 14px 12px;
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        transform: translateY(0);
    }
    .top-bar.slide-up { transform: translateY(-115%); opacity: 0; pointer-events: none; }

    .stat-chip {
        display: flex; align-items: center; gap: 6px; background: var(--bg-soft);
        border: 1px solid var(--border); border-radius: var(--radius-pill);
        padding: 6px 10px; font-weight: 800; font-size: 13px;
    }
    .stat-chip i { font-size: 14px; }
    .stat-chip.streak i { color: var(--gold); animation: flame-flicker 1.6s ease-in-out infinite; }
    @keyframes flame-flicker {
        0%, 100% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(1.14) rotate(-4deg); }
    }
    .stat-chip.level { background: linear-gradient(90deg, var(--purple), var(--purple-dark)); border: none; color: #fff; }
    .stat-chip.level i { color: #fff; }
    .stat-chip { transition: transform .2s cubic-bezier(.21,.87,.35,1); }

    .profile-btn {
        width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border);
        background: var(--bg-soft); display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: var(--text-dim); font-size: 15px;
    }

    /* ---------- Barra de busca (origem/destino) ---------- */
    .search-bar {
        top: 62px; border-radius: var(--radius-lg);
        transform: translateY(0);
    }
    .search-bar.slide-up { transform: translateY(-160%); opacity: 0; pointer-events: none; }

    .location-fields-container { display: flex; flex-direction: column; gap: 9px; }
    .location-field { display: flex; align-items: center; gap: 10px; position: relative; }
    .location-field i.pin { font-size: 16px; width: 20px; text-align: center; color: var(--orange); }
    .location-field:first-child i.pin { color: var(--green); }
    .location-field:nth-child(2) i.pin { color: var(--red); }
    .location-field input {
        flex: 1; border: 1px solid var(--border); outline: none; background: var(--input);
        color: var(--text); font-size: 14.5px; font-weight: 600; padding: 12px 12px;
        border-radius: var(--radius-sm);
    }
    .location-field input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-glow); }
    .switch-button-container { display: flex; justify-content: flex-end; padding-top: 2px; }
    .switch-button-container button {
        background: var(--bg-soft); border-radius: 999px; border: 1px solid var(--border);
        width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 14px; color: var(--text-dim); transition: transform .3s ease;
    }
    .switch-button-container button:hover { transform: rotate(180deg); color: var(--orange); }

    .autocomplete-panel { top: 190px; max-height: 46vh; overflow-y: auto; padding: 8px; border-radius: var(--radius); }
    .autocomplete-item { padding: 10px 10px; border-radius: var(--radius-sm); cursor: pointer; }
    .autocomplete-item:hover { background: var(--card-hover); }
    .autocomplete-item-top { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
    .autocomplete-item-icon { color: var(--orange); width: 16px; }
    .autocomplete-item-secondary { font-size: 12px; color: var(--text-faint); margin-left: 26px; }

    /* ---------- Painel inferior ---------- */
    .bottom-panel {
        bottom: calc(60px + max(10px, env(safe-area-inset-bottom)));
        border-radius: var(--radius-lg); padding-bottom: 20px; transform: translateY(0);
    }
    .bottom-panel.slide-down { transform: translateY(160%); opacity: 0; pointer-events: none; }
    .panel-content { display: none; flex-direction: column; gap: 10px; }
    .panel-content.active { display: flex; }

    .mode-row {
        display: flex; gap: 8px; margin-bottom: 12px; padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
        overflow: hidden; max-height: 80px; opacity: 1;
        transition: max-height .3s cubic-bezier(.21,.87,.35,1), opacity .2s ease, margin .3s ease, padding .3s ease;
    }
    .mode-row.hidden-row { max-height: 0; opacity: 0; margin-bottom: 0; padding-bottom: 0; border-bottom-color: transparent; }
    .mode-btn {
        flex: 1; border: none; border-radius: var(--radius-sm); background: var(--bg-soft);
        color: var(--text-dim); font-weight: 700; font-size: 12.5px; padding: 10px 4px; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; gap: 4px; border: 1px solid var(--border);
        transition: transform .15s cubic-bezier(.21,.87,.35,1), background .2s ease, color .2s ease, border-color .2s ease;
    }
    .mode-btn i { font-size: 16px; }
    .mode-btn:active { transform: scale(.94); }
    .mode-btn.active { background: var(--orange); color: #1a0e00; border-color: var(--orange); }

    .go-btn {
        border: none; border-radius: var(--radius); background: var(--orange); color: #1a0e00;
        font-weight: 800; font-size: 15px; padding: 14px; cursor: pointer;
        box-shadow: 0 4px 0 var(--orange-dark); display: flex; align-items: center; justify-content: center; gap: 8px;
        text-transform: uppercase;
    }
    .go-btn { transition: opacity .25s ease, transform .12s ease, box-shadow .12s ease; }
    .go-btn:disabled { opacity: .45; cursor: not-allowed; }
    .go-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: none; }

    /* Painel de rota */
    .route-summary-section { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding-bottom: 12px; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
    .route-distance { font-weight: 800; font-size: 24px; font-family: 'Baloo 2', sans-serif; }
    .route-time { font-size: 13px; color: var(--text-dim); font-weight: 700; }
    .route-eta { font-size: 12px; color: var(--orange); font-weight: 800; margin-top: 2px; display: flex; align-items: center; gap: 5px; }

    /* ---------- Indicador "ao vivo" ---------- */
    .live-dot {
        width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0;
        box-shadow: 0 0 0 0 rgba(88,204,2,.6); animation: live-pulse 1.4s ease-out infinite;
    }
    @keyframes live-pulse {
        0% { box-shadow: 0 0 0 0 rgba(88,204,2,.55); }
        70% { box-shadow: 0 0 0 7px rgba(88,204,2,0); }
        100% { box-shadow: 0 0 0 0 rgba(88,204,2,0); }
    }
    .route-risk-chip { font-size: 12px; font-weight: 800; padding: 7px 14px; border-radius: 999px; text-transform: uppercase; box-shadow: 0 4px 14px rgba(0,0,0,.25); }
    .chip-low { background: var(--grad-safe); color: #063d00; }
    .chip-mod { background: linear-gradient(135deg, #ffe066, var(--gold)); color: #3d2c00; }
    .chip-high { background: linear-gradient(135deg, #ff7a7a, var(--red)); color: #fff; }
    .chip-na { background: var(--bg-soft); color: var(--text-dim); box-shadow: none; }

    .risk-alert {
        display: none; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700;
        padding: 9px 12px; border-radius: var(--radius-sm); margin-bottom: 10px;
    }
    .risk-alert.low { background: rgba(88,204,2,.14); color: var(--green); }
    .risk-alert.moderate { background: rgba(255,200,0,.14); color: var(--gold); }
    .risk-alert.high { background: rgba(255,75,75,.14); color: var(--red); }

    .route-toggle-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .route-toggle-btn {
        flex: 1; border: 1px solid var(--border); background: var(--bg-soft); color: var(--text-dim);
        border-radius: var(--radius-sm); padding: 9px 6px; font-size: 12px; font-weight: 700; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center;
        transition: transform .15s cubic-bezier(.21,.87,.35,1), background .2s ease, color .2s ease, border-color .2s ease;
    }
    .route-toggle-btn i { font-size: 14px; }
    .route-toggle-btn:active { transform: scale(.95); }
    .route-toggle-btn.active { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }
    .route-toggle-label { font-size: 11.5px; }
    .route-toggle-meta { font-size: 10px; font-weight: 700; color: var(--text-faint); }
    .route-toggle-btn.active .route-toggle-meta { color: var(--orange); opacity: .85; }

    /* ---------- Controles flutuantes estilo Google Maps (localizacao / camadas / satelite) ---------- */
    .map-controls {
        position: absolute; right: 14px; z-index: 22; display: flex; flex-direction: column; gap: 10px;
        top: 216px; transition: top .35s cubic-bezier(.21,.87,.35,1);
    }
    .map-controls.nav-mode { top: 92px; }
    .map-control-btn {
        width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
        background: var(--card); color: var(--text-dim); display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 16px; box-shadow: var(--shadow);
        transition: transform .18s cubic-bezier(.21,.87,.35,1), color .2s ease, border-color .2s ease, background .2s ease;
    }
    .map-control-btn:active { transform: scale(.9); }
    .map-control-btn.active { color: var(--orange); border-color: var(--orange); background: var(--orange-glow); }
    .map-control-btn.pulse-once { animation: control-pulse .5s ease; }
    @keyframes control-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }

    /* ---------- Painel de instrucao de manobra (turn-by-turn) ---------- */
    .next-step-panel {
        display: none; position: absolute; top: max(18px, env(safe-area-inset-top)); left: 14px; right: 14px;
        background: linear-gradient(135deg, var(--purple), var(--purple-dark)); border-radius: var(--radius-lg);
        padding: 14px 16px; z-index: 26; box-shadow: 0 10px 28px rgba(139,92,246,.4);
        align-items: center; gap: 14px; color: #fff;
        opacity: 0; transform: translateY(-14px);
        transition: opacity .3s cubic-bezier(.21,.87,.35,1), transform .3s cubic-bezier(.21,.87,.35,1);
    }
    .next-step-panel.show { display: flex; opacity: 1; transform: translateY(0); }
    .next-step-icon-wrap {
        width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.18);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 19px;
    }
    .next-step-info { flex: 1; min-width: 0; }
    .next-step-distance { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 17px; line-height: 1.1; }
    .next-step-text { font-size: 12.5px; font-weight: 700; opacity: .92; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .start-btn {
        border: none; border-radius: var(--radius); background: var(--green); color: #063d00;
        font-weight: 800; font-size: 15px; padding: 14px; cursor: pointer;
        box-shadow: 0 4px 0 var(--green-dark); text-transform: uppercase;
    }
    .start-btn:active { transform: translateY(3px); box-shadow: none; }
    .start-btn.loading { opacity: .8; }

    .back-link-btn {
        background: transparent; border: none; color: var(--text-dim); font-weight: 700; font-size: 13px;
        padding: 6px; cursor: pointer; text-align: center;
    }

    /* Painel de denúncia */
    .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
    .report-btn {
        background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius);
        color: var(--text); padding: 14px 8px; font-weight: 700; font-size: 12.5px; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
    }
    .report-btn:active { transform: scale(.96); }
    .report-btn i { font-size: 22px; }
    .report-btn.sev-1 i { color: var(--green); }
    .report-btn.sev-2 i { color: var(--gold); }
    .report-btn.sev-3 i { color: var(--red); }
    .report-xp-hint { text-align: center; font-size: 12px; color: var(--text-faint); font-weight: 700; margin: 2px 0 8px; }
    .report-xp-hint i { color: var(--gold); }

    /* ---------- Botão flutuante contextual (encerrar navegação) ---------- */
    .floating-action-btn {
        position: absolute; width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border);
        background: var(--card); color: var(--text); font-size: 18px; display: flex; align-items: center;
        justify-content: center; cursor: pointer; box-shadow: var(--shadow); z-index: 25;
        transition: transform .18s cubic-bezier(.21,.87,.35,1), box-shadow .18s ease, filter .18s ease;
    }
    .floating-action-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .floating-action-btn:active { transform: translateY(1px) scale(.94); }
    .nav-end-btn { display: none; top: max(18px, env(safe-area-inset-top)); right: 16px; background: var(--red); color: #fff; border: none; }

    /* ---------- Nav bar inferior ---------- */
    .app-navbar {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; display: flex;
        background: var(--card); border-top: 1px solid var(--border);
        padding: 8px 8px max(8px, env(safe-area-inset-bottom));
        box-shadow: 0 -6px 24px rgba(0,0,0,.4);
        transition: transform .4s cubic-bezier(.21,.87,.35,1), opacity .25s ease;
    }
    .app-navbar.slide-down { transform: translateY(130%); opacity: 0; pointer-events: none; }
    .nav-btn {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        background: none; border: none; color: var(--text-faint); font-weight: 800; font-size: 10.5px;
        padding: 7px 2px 5px; border-radius: var(--radius-sm); cursor: pointer;
        transition: color .2s ease, transform .15s cubic-bezier(.21,.87,.35,1), background .2s ease;
    }
    .nav-btn i { font-size: 19px; transition: transform .2s cubic-bezier(.21,.87,.35,1); }
    .nav-btn:active { transform: scale(.92); }
    .nav-btn:active i { transform: scale(.9); }
    .nav-btn.active { color: var(--orange); background: var(--orange-glow); }
    .nav-btn-sos { color: var(--red); }
    .nav-btn-sos i { animation: sos-breathe-icon 1.8s ease-in-out infinite; }
    @keyframes sos-breathe-icon {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.18); }
    }

    /* Velocímetro: fixo na parte inferior esquerda da tela, acima do painel de navegação */
    .speedometer {
        display: none; position: absolute; left: 16px;
        bottom: max(160px, calc(150px + env(safe-area-inset-bottom)));
        background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 10px 18px; z-index: 55; text-align: center; box-shadow: var(--shadow);
        opacity: 0; transform: translateY(14px) scale(.92);
        transition: opacity .35s cubic-bezier(.21,.87,.35,1), transform .35s cubic-bezier(.21,.87,.35,1), border-color .25s ease;
    }
    .speedometer.show { display: block; opacity: 1; transform: translateY(0) scale(1); }
    .speedometer .current-speed { font-size: 28px; font-weight: 800; font-family: 'Baloo 2', sans-serif; line-height: 1; transition: color .2s ease; }
    .speedometer .speed-limit { font-size: 11px; color: var(--text-dim); font-weight: 700; }
    .speedometer.overspeed { border-color: var(--red); animation: speedometer-warn 1s ease-in-out infinite; }
    .speedometer.overspeed .current-speed { color: var(--red); }
    @keyframes speedometer-warn {
        0%, 100% { box-shadow: var(--shadow); }
        50% { box-shadow: 0 0 0 4px rgba(255,75,75,.28), var(--shadow); }
    }
    #navigationControls { display: none; }

    /* ---------- XP toast / level-up ---------- */
    .xp-toast {
        position: fixed; top: 76px; left: 50%; transform: translateX(-50%) translateY(-30px);
        background: linear-gradient(90deg, var(--gold), #ffe066); color: #3d2c00; font-weight: 800;
        font-size: 14px; padding: 10px 18px; border-radius: var(--radius-pill); box-shadow: var(--shadow);
        z-index: 999; opacity: 0; transition: transform .35s ease, opacity .35s ease; display: flex; align-items: center; gap: 8px;
    }
    .xp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .levelup-overlay {
        position: fixed; inset: 0; background: rgba(5,6,8,.78); z-index: 1000;
        display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .levelup-overlay.show { display: flex; }
    .levelup-card {
        background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
        padding: 34px 26px; text-align: center; max-width: 320px; box-shadow: var(--shadow);
        position: relative; overflow: hidden;
    }
    .levelup-card .medal {
        width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 16px;
        background: linear-gradient(145deg, var(--gold), #e0a800); display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 0 #b58600;
    }
    .levelup-card .medal i { font-size: 40px; color: #3d2c00; }
    .levelup-card h3 { font-family: 'Baloo 2', sans-serif; font-size: 24px; margin: 0 0 6px; }
    .levelup-card p { color: var(--text-dim); font-weight: 600; font-size: 14px; margin: 0 0 20px; }

    /* ---------- Marcador do usuário (heading + pulso em tempo real) ---------- */
    .user-marker-wrap { width: 34px; height: 34px; position: relative; display: flex; align-items: center; justify-content: center; }
    .user-marker-pulse {
        position: absolute; width: 34px; height: 34px; border-radius: 50%;
        background: rgba(139,92,246,.28); animation: user-pulse 1.8s ease-out infinite;
    }
    @keyframes user-pulse {
        0% { transform: scale(.4); opacity: .9; }
        100% { transform: scale(1.9); opacity: 0; }
    }
    .user-marker-dot {
        position: relative; width: 22px; height: 22px; border-radius: 50%;
        background: var(--purple); border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.35);
        display: flex; align-items: center; justify-content: center;
    }
    .user-marker-arrow { font-size: 10px; color: #fff; transform-origin: center; transition: transform .3s linear; }

    /* ---------- Marcador de destino (bandeira) ---------- */
    .dest-marker-wrap { width: 40px; height: 52px; position: relative; display: flex; flex-direction: column; align-items: center; }
    .dest-marker-pin {
        width: 38px; height: 38px; border-radius: 50% 50% 50% 4px; transform: rotate(-45deg);
        background: linear-gradient(145deg, var(--red), var(--red-dark)); display: flex; align-items: center; justify-content: center;
        box-shadow: 0 6px 14px rgba(255,75,75,.4), 0 0 0 3px #fff;
        animation: dest-drop .5s cubic-bezier(.21,.87,.35,1);
    }
    .dest-marker-pin i { transform: rotate(45deg); color: #fff; font-size: 15px; }
    .dest-marker-shadow { width: 14px; height: 5px; border-radius: 50%; background: rgba(0,0,0,.35); margin-top: 2px; filter: blur(1px); }
    @keyframes dest-drop {
        0% { transform: rotate(-45deg) translateY(-22px) scale(.4); opacity: 0; }
        70% { transform: rotate(-45deg) translateY(2px) scale(1.05); opacity: 1; }
        100% { transform: rotate(-45deg) translateY(0) scale(1); }
    }

    /* ---------- Ícones de trechos de risco (ruas perigosas) ---------- */
    .hotspot-marker-wrap { width: 30px; height: 30px; }
    .hotspot-marker-dot {
        width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        border: 3px solid #fff; box-shadow: 0 3px 10px rgba(0,0,0,.35); font-size: 12.5px; color: #fff;
    }
    .hotspot-marker-wrap.high .hotspot-marker-dot { background: var(--red); animation: hotspot-pulse-high 1.8s ease-in-out infinite; }
    .hotspot-marker-wrap.moderate .hotspot-marker-dot { background: var(--gold); color: #3d2c00; }
    .hotspot-marker-wrap.low .hotspot-marker-dot { background: var(--green); color: #063d00; }
    @keyframes hotspot-pulse-high {
        0%, 100% { box-shadow: 0 3px 10px rgba(0,0,0,.35), 0 0 0 0 rgba(255,75,75,.5); }
        50% { box-shadow: 0 3px 10px rgba(0,0,0,.35), 0 0 0 7px rgba(255,75,75,0); }
    }

    /* ---------- Progresso da navegação (distância / ETA em tempo real) ---------- */
    .nav-progress {
        display: none; position: absolute; top: max(18px, env(safe-area-inset-top)); left: 50%;
        transform: translateX(-50%); background: var(--card); border: 1px solid var(--border);
        border-radius: var(--radius-pill); padding: 9px 16px; z-index: 25; box-shadow: var(--shadow);
        align-items: center; gap: 10px; font-weight: 700; font-size: 12.5px; max-width: 78vw;
    }
    .nav-progress.show { display: flex; }
    .nav-progress i { color: var(--purple); font-size: 14px; }
    .nav-progress-text { display: flex; flex-direction: column; gap: 1px; line-height: 1.25; }
    .nav-progress-text span:first-child { color: var(--text); }
    .nav-progress-text span:last-child { color: var(--text-dim); font-size: 11px; font-weight: 600; }

    /* ---------- Otimização para toque em telas pequenas ---------- */
    @media (max-width: 380px) {
        .floating-action-btn { width: 46px; height: 46px; font-size: 16px; }
        .route-distance { font-size: 21px; }
    }
    button, .report-btn, .mode-btn, .route-toggle-btn { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    /* ============================================================
       ✨ Camada extra de polimento visual — mais ícones, mais vida
       ============================================================ */

    /* Painéis flutuantes com brilho sutil de borda e leve elevação no hover */
    .floating-panel { box-shadow: var(--shadow-lg); }
    .floating-panel:hover { border-color: rgba(255,140,31,.22); }

    /* Chips do topo com leve elevação ao tocar */
    .stat-chip:active { transform: scale(.95); }
    .stat-chip.level { box-shadow: 0 4px 14px rgba(139,92,246,.35); }
    .profile-btn:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-1px); }
    .profile-btn { transition: transform .18s cubic-bezier(.21,.87,.35,1), color .2s ease, border-color .2s ease; }

    /* Badge circular colorido para os ícones do modo de transporte */
    .mode-btn .mode-icon-badge {
        width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        background: var(--card); color: var(--text-dim); font-size: 13px;
        transition: background .2s ease, color .2s ease, transform .2s cubic-bezier(.21,.87,.35,1);
    }
    .mode-btn.active .mode-icon-badge { background: rgba(26,14,0,.18); color: #1a0e00; transform: scale(1.08); }
    .mode-btn:hover .mode-icon-badge { transform: scale(1.08); }

    /* Badge circular colorido para os ícones de denúncia — mais "iconografia" no painel de relato */
    .report-btn .report-icon-badge {
        width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        transition: transform .2s cubic-bezier(.21,.87,.35,1);
    }
    .report-btn:hover .report-icon-badge { transform: scale(1.12) rotate(-4deg); }
    .report-btn.sev-1 .report-icon-badge { background: rgba(88,204,2,.14); }
    .report-btn.sev-2 .report-icon-badge { background: rgba(255,200,0,.14); }
    .report-btn.sev-3 .report-icon-badge { background: rgba(255,75,75,.14); }
    .report-btn.sev-1 .report-icon-badge i { color: var(--green); }
    .report-btn.sev-2 .report-icon-badge i { color: var(--gold); }
    .report-btn.sev-3 .report-icon-badge i { color: var(--red); }
    .report-btn { gap: 10px !important; transition: transform .15s cubic-bezier(.21,.87,.35,1), border-color .2s ease, background .2s ease; }
    .report-btn:hover { border-color: var(--orange); background: var(--card-hover); }

    /* Botões de controle do mapa: leve brilho ao ativar */
    .map-control-btn:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-2px); }

    /* Chip de risco da rota com brilho suave contínuo */
    .route-risk-chip { position: relative; overflow: hidden; }
    .route-risk-chip::after {
        content: ""; position: absolute; inset: 0; background: linear-gradient(120deg, transparent, rgba(255,255,255,.35), transparent);
        transform: translateX(-120%); animation: chip-shine 3.2s ease-in-out infinite;
    }
    @keyframes chip-shine { 60% { transform: translateX(-120%); } 100% { transform: translateX(120%); } }

    /* Ícone de resultado de busca em círculo (mais destaque na autocomplete) */
    .autocomplete-item-icon {
        width: 30px; height: 30px; border-radius: 50%; background: var(--orange-glow);
        display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .autocomplete-item-top { gap: 12px !important; }

    /* SOS com respiro visual mais chamativo (glow pulsante) */
    .nav-btn-sos { position: relative; }
    .nav-btn-sos::before {
        content: ""; position: absolute; top: 2px; width: 34px; height: 34px; border-radius: 50%;
        background: rgba(255,75,75,.18); animation: sos-glow 1.8s ease-in-out infinite;
    }
    @keyframes sos-glow { 0%, 100% { opacity: .5; transform: scale(.9); } 50% { opacity: 0; transform: scale(1.35); } }

    /* Entrada suave dos painéis principais ao carregar a tela */
    .top-bar, .search-bar, .app-navbar { animation: fade-in-up .5s cubic-bezier(.21,.87,.35,1) both; }
    .search-bar { animation-delay: .06s; }
    .app-navbar { animation-delay: .1s; }
    @keyframes fade-in-up { 0% { opacity: 0; transform: translateY(14px); } 100% { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body>

<!-- CONTAINER DO MAPA (Mapbox GL renderiza aqui) -->
<div id="map"></div>

<!-- PAINEL DE PROXIMA MANOBRA (turn-by-turn, so aparece durante a navegacao) -->
<div class="next-step-panel" id="nextStepPanel">
    <div class="next-step-icon-wrap"><i class="fa-solid fa-arrow-up" id="nextStepIcon"></i></div>
    <div class="next-step-info">
        <div class="next-step-distance" id="nextStepDistance">-- m</div>
        <div class="next-step-text" id="nextStepText">Siga em frente</div>
    </div>
</div>

<!-- CONTROLES ESTILO GOOGLE MAPS: localizacao, satelite, mapa de calor -->
<div class="map-controls" id="mapControls">
    <button class="map-control-btn" id="satelliteToggleBtn" title="Alternar vista de satelite"><i class="fa-solid fa-earth-americas"></i></button>
    <button class="map-control-btn" id="heatmapToggleBtn" title="Mapa de calor de risco"><i class="fa-solid fa-fire-flame-curved"></i></button>
    <button class="map-control-btn" id="myLocationBtn" title="Minha localizacao"><i class="fa-solid fa-location-crosshairs"></i></button>
</div>

<!-- TOP BAR: gamificação -->
<div class="floating-panel top-bar" id="topBar">
    <div class="stat-chip level" id="levelChip"><i class="fa-solid fa-star"></i> <span id="levelValue">1</span></div>
    <div class="stat-chip streak" id="streakChip"><i class="fa-solid fa-fire"></i> <span id="streakValue">0</span></div>
    <div class="stat-chip" style="flex:1; min-width:0;">
        <div class="xp-bar-track" style="flex:1;"><div class="xp-bar-fill" id="xpBarFill" style="width:0%;"></div></div>
    </div>
    <button class="profile-btn" id="profileBtn" title="Perfil"><i class="fa-solid fa-user"></i></button>
</div>

<!-- BARRA DE BUSCA -->
<div class="floating-panel search-bar" id="searchBar">
    <div class="location-fields-container">
        <div class="location-field">
            <i class="fa-solid fa-location-dot pin"></i>
            <input type="text" id="originInput" placeholder="Minha localização" value="Minha Localização">
        </div>
        <div class="location-field">
            <i class="fa-solid fa-flag-checkered pin"></i>
            <input type="text" id="destinationInput" placeholder="Para onde vamos?">
        </div>
    </div>
    <div class="switch-button-container">
        <button id="switchBtn" title="Inverter"><i class="fa-solid fa-arrows-up-down"></i></button>
    </div>
</div>

<!-- AUTOCOMPLETE -->
<div class="floating-panel autocomplete-panel hidden-panel" id="autocompleteContainer"></div>

<!-- PAINEL INFERIOR -->
<div class="floating-panel bottom-panel" id="mainBottomPanel">

    <!-- Seletor de modo de transporte: fica visível tanto na busca quanto com a rota já calculada,
         para permitir trocar entre carro/bike/a pé a qualquer momento (corrige bug de troca de modo). -->
    <div class="mode-row" id="modeRow">
        <button class="mode-btn active" data-profile="driving"><span class="mode-icon-badge"><i class="fa-solid fa-car"></i></span> Carro</button>
        <button class="mode-btn" data-profile="cycling"><span class="mode-icon-badge"><i class="fa-solid fa-bicycle"></i></span> Bike</button>
        <button class="mode-btn" data-profile="walking"><span class="mode-icon-badge"><i class="fa-solid fa-person-walking"></i></span> A pé</button>
    </div>

    <!-- Estado: selecionar destino -->
    <div class="panel-content active" id="locationSelectionPanel">
        <button class="go-btn" id="goBtnDummy" disabled><i class="fa-solid fa-route"></i> Digite um destino</button>
    </div>

    <!-- Estado: rota calculada -->
    <div class="panel-content" id="routePanel">
        <div class="route-summary-section">
            <div>
                <div class="route-distance" id="routeDistance">-- km</div>
                <div class="route-time" id="routeTime">-- min</div>
                <div class="route-eta"><i class="fa-solid fa-flag-checkered"></i> <span id="routeEta">Chegada às --:--</span></div>
            </div>
            <div class="route-risk-chip chip-na" id="routeRiskChip">RISCO N/A</div>
        </div>

        <div class="risk-alert" id="riskAlert"></div>

        <!-- Preenchido dinamicamente pelo app.js com as 3 opcoes reais: segura / equilibrada / rapida -->
        <div class="route-toggle-row" id="routeToggleRow" style="display:none;"></div>

        <button class="start-btn" id="startBtn"><i class="fa-solid fa-location-arrow"></i> Iniciar navegação</button>
        <button class="back-link-btn" id="backToSearchBtn">← Escolher outro destino</button>
    </div>

    <!-- Estado: relatar incidente -->
    <div class="panel-content" id="reportPanel">
        <p class="report-xp-hint"><i class="fa-solid fa-bolt"></i> Cada relato confirmado gera XP e ajuda a comunidade</p>
        <div class="report-grid">
            <button class="report-btn sev-1" data-category="ma-iluminacao" data-severity="1"><span class="report-icon-badge"><i class="fa-solid fa-lightbulb"></i></span> Iluminação ruim</button>
            <button class="report-btn sev-2" data-category="suspeito" data-severity="2"><span class="report-icon-badge"><i class="fa-solid fa-user-secret"></i></span> Atividade suspeita</button>
            <button class="report-btn sev-3" data-category="assalto" data-severity="3"><span class="report-icon-badge"><i class="fa-solid fa-triangle-exclamation"></i></span> Assalto / Roubo</button>
            <button class="report-btn sev-3" data-category="acidente" data-severity="3"><span class="report-icon-badge"><i class="fa-solid fa-car-burst"></i></span> Acidente</button>
            <button class="report-btn sev-2" data-category="via-bloqueada" data-severity="2"><span class="report-icon-badge"><i class="fa-solid fa-road-barrier"></i></span> Via bloqueada</button>
            <button class="report-btn sev-1" data-category="radar" data-severity="1"><span class="report-icon-badge"><i class="fa-solid fa-camera-cctv"></i></span> Radar / Blitz</button>
        </div>
        <button class="back-link-btn" id="reportCloseBtn"><i class="fa-solid fa-xmark"></i> Voltar para rota</button>
    </div>
</div>

<!-- NAV BAR INFERIOR -->
<nav class="app-navbar" id="appNavbar">
    <button class="nav-btn active" id="centerBtn"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></button>
    <button class="nav-btn" id="alertBtn"><i class="fa-solid fa-triangle-exclamation"></i><span>Relatar</span></button>
    <button class="nav-btn nav-btn-sos" id="sosBtn"><i class="fa-solid fa-bell"></i><span>SOS</span></button>
    <button class="nav-btn" id="navProfileBtn"><i class="fa-solid fa-user-shield"></i><span>Perfil</span></button>
</nav>

<button class="floating-action-btn nav-end-btn" id="endNavigationBtn" title="Encerrar navegação"><i class="fa-solid fa-square-xmark"></i></button>

<!-- VELOCÍMETRO -->
<div class="speedometer" id="speedometer">
    <div class="current-speed" id="currentSpeed">0</div>
    <div class="speed-limit" id="speedLimit">Limite: 60 km/h</div>
</div>

<!-- PROGRESSO DA NAVEGAÇÃO -->
<div class="nav-progress" id="navProgress">
    <span class="live-dot" title="Rastreando em tempo real"></span>
    <i class="fa-solid fa-route"></i>
    <div class="nav-progress-text">
        <span id="navRemainingDistance">-- km restantes</span>
        <span id="navEta">~-- min · chegada às --:--</span>
    </div>
</div>

<!-- XP TOAST -->
<div class="xp-toast" id="xpToast"><i class="fa-solid fa-bolt"></i> <span id="xpToastMsg"></span></div>

<!-- LEVEL UP -->
<div class="levelup-overlay" id="levelupOverlay">
    <div class="levelup-card pop-in">
        <div class="confetti-burst" id="confettiBurst"></div>
        <div class="medal"><i class="fa-solid fa-trophy"></i></div>
        <h3>Você subiu de nível!</h3>
        <p id="levelupText">Agora você é nível 2. Continue protegendo a comunidade.</p>
        <button class="btn btn-primary" id="levelupCloseBtn">Continuar</button>
    </div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i><span id="toastMsg"></span></div>
