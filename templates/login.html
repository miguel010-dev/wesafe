<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Entrar — WeSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

<style>
    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px 18px;
    }
    .login-box {
        width: 100%;
        max-width: 400px;
        padding: 34px 26px 30px;
        position: relative;
        z-index: 1;
    }
    .badge-top {
        width: 64px; height: 64px;
        border-radius: 18px;
        background: linear-gradient(145deg, var(--purple), var(--purple-dark));
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 18px;
        box-shadow: 0 6px 0 var(--purple-dark);
    }
    .badge-top i { font-size: 28px; color: #fff; }

    .login-box h2 {
        margin: 0 0 4px;
        font-family: 'Baloo 2', sans-serif;
        font-size: 26px;
        font-weight: 800;
        text-align: center;
    }
    .login-box .sub {
        text-align: center;
        color: var(--text-dim);
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 24px;
    }

    .separator {
        text-align: center;
        color: var(--text-faint);
        font-size: 12.5px;
        font-weight: 700;
        text-transform: uppercase;
        margin: 20px 0;
        position: relative;
    }
    .separator::before, .separator::after {
        content: ""; position: absolute; top: 50%;
        width: 34%; height: 1px; background: var(--border);
    }
    .separator::before { left: 0; }
    .separator::after { right: 0; }

    .forgot-pass { text-align: right; margin: -8px 0 18px; }
    .forgot-pass a { font-size: 13px; color: var(--text-dim); text-decoration: none; font-weight: 600; }
    .forgot-pass a:hover { color: var(--orange); }

    .register-link { margin-top: 22px; text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600; }
    .register-link a { color: var(--orange); text-decoration: none; font-weight: 800; }

    .streak-strip {
        display: flex; align-items: center; justify-content: center; gap: 18px;
        margin: 22px 0 4px; padding: 12px; border-radius: var(--radius);
        background: var(--card); border: 1px solid var(--border);
    }
    .streak-strip .item { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; color: var(--text-dim); }
    .streak-strip i.fire { color: var(--gold); }
    .streak-strip i.shield { color: var(--green); }
</style>
</head>

<body>

<div class="ambient-bg"><div class="ambient-blob orange"></div><div class="ambient-blob purple"></div></div>

<div class="login-box card pop-in page-transition-in">
    <div class="badge-top"><i class="fa-solid fa-user-shield"></i></div>
    <h2>Bem-vindo de volta</h2>
    <p class="sub">Continue protegendo sua rota</p>

    <form id="loginForm" novalidate>
        <div class="field" id="fieldEmail">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Email" required autocomplete="email">
        </div>
        <p class="field-error">Informe um email válido.</p>

        <div class="field" id="fieldPass">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Senha" required autocomplete="current-password">
            <i class="fa-solid fa-eye toggle-pass" id="togglePass"></i>
        </div>
        <p class="field-error">Digite sua senha.</p>

        <div class="forgot-pass"><a href="#">Esqueci minha senha</a></div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="btn-label">Entrar</span>
        </button>
    </form>

    <div class="streak-strip">
        <div class="item"><i class="fa-solid fa-fire fire"></i> Sequência diária</div>
        <div class="item"><i class="fa-solid fa-shield-halved shield"></i> Comunidade segura</div>
    </div>

    <p class="register-link">Não tem conta? <a href="{{ url_for('registro') }}">Criar agora</a></p>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i><span id="toastMsg"></span></div>

<script>
    const API_BASE = "";

    function showToast(msg, type = "success") {
        const toast = document.getElementById("toast");
        const icon = toast.querySelector("i");
        const msgEl = document.getElementById("toastMsg");
        toast.className = "toast show " + type;
        icon.className = type === "error" ? "fa-solid fa-circle-exclamation" : "fa-solid fa-circle-check";
        msgEl.textContent = msg;
        clearTimeout(window._toastTimeout);
        window._toastTimeout = setTimeout(() => toast.classList.remove("show"), 3200);
    }

    document.getElementById("togglePass").addEventListener("click", (e) => {
        const input = document.getElementById("password");
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        e.target.classList.toggle("fa-eye");
        e.target.classList.toggle("fa-eye-slash");
    });

    function validEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function setFieldState(fieldEl, valid) {
        fieldEl.classList.toggle("invalid", !valid);
    }

    // Se já existe um token salvo, pula direto para o app
    if (localStorage.getItem("wesafe_token")) {
        window.location.href = {{ url_for('home')|tojson }};
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const emailOk = validEmail(email);
        const passOk = password.length > 0;

        setFieldState(document.getElementById("fieldEmail"), emailOk);
        setFieldState(document.getElementById("fieldPass"), passOk);

        if (!emailOk || !passOk) return;

        const btn = document.getElementById("submitBtn");
        const label = btn.querySelector(".btn-label");
        btn.disabled = true;
        label.innerHTML = '<span class="spinner"></span> Entrando...';

        try {
            const resp = await fetch(`${API_BASE}/api/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await resp.json();

            if (!resp.ok) {
                throw new Error(data.error || "Credenciais inválidas.");
            }

            localStorage.setItem("wesafe_token", data.access_token);
            localStorage.setItem("wesafe_user_id", data.user_id);

            showToast("Login realizado! Redirecionando...", "success");
            setTimeout(() => window.location.href = {{ url_for('home')|tojson }}, 700);
        } catch (err) {
            showToast(err.message || "Erro ao entrar. Tente novamente.", "error");
            btn.disabled = false;
            label.textContent = "Entrar";
        }
    });
</script>

</body>
</html>
