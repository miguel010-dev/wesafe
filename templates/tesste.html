<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema Solar 3D</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: system-ui, sans-serif;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="info">
    Sistema Solar 3D – arraste com o mouse para orbitar, roda do mouse para zoom.
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    // ----------------------------------------------------
    // Cena, câmera e renderizador
    // ----------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      10000
    );
    camera.position.set(0, 120, 260);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.physicallyCorrectLights = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 40;
    controls.maxDistance = 800;

    // ----------------------------------------------------
    // Luz e Sol
    // ----------------------------------------------------
    const solarSystem = new THREE.Object3D();
    scene.add(solarSystem);

    const sunRadius = 18;
    const sunGeo = new THREE.SphereGeometry(sunRadius, 64, 64);
    const sunMat = new THREE.MeshStandardMaterial({
      emissive: new THREE.Color(0xffdd88),
      emissiveIntensity: 4,
      color: 0x222222,
      roughness: 0.4,
      metalness: 0.0
    });
    const sunMesh = new THREE.Mesh(sunGeo, sunMat);
    solarSystem.add(sunMesh);

    // Luz do Sol (ponto de luz forte no centro)
    const sunLight = new THREE.PointLight(0xffffff, 3.0, 0, 2);
    sunLight.position.set(0, 0, 0);
    solarSystem.add(sunLight);

    // Luz ambiente suave
    const ambientLight = new THREE.AmbientLight(0x202030, 0.5);
    scene.add(ambientLight);

    // ----------------------------------------------------
    // Fundo de estrelas (uma esfera gigante "invertida")
    // ----------------------------------------------------
    const starsGeo = new THREE.SphereGeometry(4000, 64, 64);
    const starsMat = new THREE.MeshBasicMaterial({
      side: THREE.BackSide,
      map: null,
      color: 0x111122
    });
    const starField = new THREE.Mesh(starsGeo, starsMat);
    scene.add(starField);

    // opcional: pontos de estrelas
    const starPointsGeo = new THREE.BufferGeometry();
    const starCount = 6000;
    const positions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const radius = 2000 + Math.random() * 1500;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const x = radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.sin(phi) * Math.sin(theta);
      const z = radius * Math.cos(phi);
      positions.set([x, y, z], i * 3);
    }
    starPointsGeo.setAttribute(
      'position',
      new THREE.BufferAttribute(positions, 3)
    );
    const starPointsMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 4,
      sizeAttenuation: true
    });
    const starPoints = new THREE.Points(starPointsGeo, starPointsMat);
    scene.add(starPoints);

    // ----------------------------------------------------
    // Planetas (escala reduzida / distâncias comprimidas)
    // ----------------------------------------------------
    const textureLoader = new THREE.TextureLoader();

    // Tamanhos e distâncias NÃO são em escala real, apenas proporcionais
    const planetConfigs = [
      {
        name: 'Mercúrio',
        radius: 2,
        distance: 30,
        orbitSpeed: 0.04,
        rotationSpeed: 0.03,
        texture: 'https://threejs.org/examples/textures/planets/mercury.jpg',
        color: 0xaaaaaa
      },
      {
        name: 'Vênus',
        radius: 3,
        distance: 40,
        orbitSpeed: 0.03,
        rotationSpeed: 0.02,
        texture: 'https://threejs.org/examples/textures/planets/venus.jpg',
        color: 0xeed5b7
      },
      {
        name: 'Terra',
        radius: 3.2,
        distance: 52,
        orbitSpeed: 0.025,
        rotationSpeed: 0.04,
        texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
        color: 0x88aaff
      },
      {
        name: 'Marte',
        radius: 2.5,
        distance: 64,
        orbitSpeed: 0.022,
        rotationSpeed: 0.038,
        texture: 'https://threejs.org/examples/textures/planets/mars_1k_color.jpg',
        color: 0xff5533
      },
      {
        name: 'Júpiter',
        radius: 7,
        distance: 88,
        orbitSpeed: 0.011,
        rotationSpeed: 0.09,
        texture: 'https://threejs.org/examples/textures/planets/jupiter2_1024.jpg',
        color: 0xf4e4b8
      },
      {
        name: 'Saturno',
        radius: 6,
        distance: 112,
        orbitSpeed: 0.009,
        rotationSpeed: 0.07,
        texture: 'https://threejs.org/examples/textures/planets/saturn.jpg',
        color: 0xf6e2a2
      },
      {
        name: 'Urano',
        radius: 4.5,
        distance: 136,
        orbitSpeed: 0.007,
        rotationSpeed: 0.05,
        texture: 'https://threejs.org/examples/textures/planets/uranus.jpg',
        color: 0x88ddff
      },
      {
        name: 'Netuno',
        radius: 4.5,
        distance: 160,
        orbitSpeed: 0.006,
        rotationSpeed: 0.048,
        texture: 'https://threejs.org/examples/textures/planets/neptune.jpg',
        color: 0x4466ff
      }
    ];

    const planets = [];

    function createOrbitRing(distance) {
      const segments = 128;
      const orbitGeo = new THREE.BufferGeometry();
      const positions = [];
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const x = Math.cos(angle) * distance;
        const z = Math.sin(angle) * distance;
        positions.push(x, 0, z);
      }
      orbitGeo.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(positions, 3)
      );
      const orbitMat = new THREE.LineBasicMaterial({
        color: 0x444444,
        transparent: true,
        opacity: 0.6
      });
      const orbit = new THREE.LineLoop(orbitGeo, orbitMat);
      solarSystem.add(orbit);
    }

    for (const config of planetConfigs) {
      // Órbita como "pivot" para girar o planeta ao redor do Sol
      const orbitPivot = new THREE.Object3D();
      solarSystem.add(orbitPivot);

      // Esfera do planeta
      const geo = new THREE.SphereGeometry(config.radius, 48, 48);
      const baseMat = new THREE.MeshStandardMaterial({
        color: config.color,
        roughness: 0.7,
        metalness: 0.0
      });

      if (config.texture) {
        baseMat.map = textureLoader.load(config.texture);
      }

      const mesh = new THREE.Mesh(geo, baseMat);
      mesh.position.x = config.distance;
      orbitPivot.add(mesh);

      // Cria o anel de órbita visual
      createOrbitRing(config.distance);

      planets.push({
        name: config.name,
        mesh,
        orbitPivot,
        orbitSpeed: config.orbitSpeed,
        rotationSpeed: config.rotationSpeed
      });

      // Anéis de Saturno
      if (config.name === 'Saturno') {
        const ringTexture = textureLoader.load(
          'https://threejs.org/examples/textures/planets/saturnringcolor.jpg'
        );
        const ringGeo = new THREE.RingGeometry(
          config.radius * 1.4,
          config.radius * 2.3,
          64
        );
        const ringMat = new THREE.MeshBasicMaterial({
          map: ringTexture,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.9
        });
        const rings = new THREE.Mesh(ringGeo, ringMat);
        rings.rotation.x = Math.PI / 2;
        mesh.add(rings);
      }
    }

    // ----------------------------------------------------
    // Animação
    // ----------------------------------------------------
    const clock = new THREE.Clock();

    function animate() {
      const delta = clock.getDelta();

      // Rotação do Sol
      sunMesh.rotation.y += 0.01 * delta * 60;

      // Planetas girando em torno do Sol e em torno do próprio eixo
      planets.forEach((p) => {
        p.orbitPivot.rotation.y += p.orbitSpeed * delta * 60;
        p.mesh.rotation.y += p.rotationSpeed * delta * 60;
      });

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    // ----------------------------------------------------
    // Resize
    // ----------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
