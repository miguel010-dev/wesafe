<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Meu perfil — WeSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

<style>
    body { min-height: 100vh; padding: 0 0 40px; }

    .profile-topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: max(16px, env(safe-area-inset-top)) 18px 14px;
    }
    .back-btn {
        width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border);
        background: var(--card); color: var(--text); display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 15px;
    }
    .profile-topbar h1 { font-family: 'Baloo 2', sans-serif; font-size: 17px; font-weight: 800; margin: 0; }
    .logout-btn {
        border: 1px solid var(--border); background: transparent; color: var(--text-dim);
        border-radius: var(--radius-pill); padding: 8px 14px; font-weight: 700; font-size: 12.5px; cursor: pointer;
        display: flex; align-items: center; gap: 6px;
    }
    .logout-btn:hover { color: var(--red); border-color: var(--red); }

    .profile-hero {
        display: flex; flex-direction: column; align-items: center; text-align: center;
        padding: 10px 20px 26px;
    }
    .avatar {
        width: 92px; height: 92px; border-radius: 50%;
        background: linear-gradient(145deg, var(--orange), var(--orange-dark));
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 0 var(--orange-dark), 0 18px 30px rgba(255,140,31,.25);
        margin-bottom: 14px; font-size: 38px; color: #1a0e00; position: relative;
        animation: avatar-breathe 3.4s ease-in-out infinite;
    }
    @keyframes avatar-breathe {
        0%, 100% { box-shadow: 0 8px 0 var(--orange-dark), 0 18px 30px rgba(255,140,31,.25); }
        50% { box-shadow: 0 8px 0 var(--orange-dark), 0 22px 42px rgba(255,140,31,.4); }
    }
    .avatar .level-badge {
        position: absolute; bottom: -6px; right: -6px; background: var(--purple); color: #fff;
        border: 3px solid var(--bg); border-radius: 50%; width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px;
        animation: pop-in .5s cubic-bezier(.21,.87,.35,1) .3s both;
    }
    .profile-hero h2 { font-family: 'Baloo 2', sans-serif; font-size: 22px; font-weight: 800; margin: 0 0 2px; }
    .profile-hero .email { color: var(--text-dim); font-size: 13.5px; font-weight: 600; margin: 0 0 10px; }
    .badge-tag {
        display: inline-flex; align-items: center; gap: 6px; background: var(--orange-glow); color: var(--orange);
        border-radius: var(--radius-pill); padding: 6px 14px; font-size: 12px; font-weight: 800;
    }

    .xp-section { padding: 0 20px 22px; }
    .xp-card { padding: 18px 20px; }
    .xp-card .xp-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .xp-card .xp-top .label { font-size: 12.5px; color: var(--text-dim); font-weight: 700; }
    .xp-card .xp-top .value { font-family: 'Baloo 2', sans-serif; font-size: 15px; font-weight: 800; color: var(--orange); }

    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 22px; }
    .metric-card { padding: 18px 16px; text-align: center; }
    .metric-card .icon {
        width: 40px; height: 40px; border-radius: 12px; margin: 0 auto 10px; display: flex;
        align-items: center; justify-content: center; font-size: 17px;
    }
    .metric-card .icon.orange { background: var(--orange-glow); color: var(--orange); }
    .metric-card .icon.purple { background: rgba(139,92,246,.18); color: var(--purple); }
    .metric-card .icon.gold { background: rgba(255,200,0,.16); color: var(--gold); }
    .metric-card .icon.green { background: rgba(88,204,2,.16); color: var(--green); }
    .metric-card .value { font-family: 'Baloo 2', sans-serif; font-size: 24px; font-weight: 800; line-height: 1; }
    .metric-card .label { color: var(--text-dim); font-size: 12px; font-weight: 700; margin-top: 6px; }

    .member-since { text-align: center; color: var(--text-faint); font-size: 12.5px; font-weight: 600; padding: 0 20px; }

    .loading-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-weight: 700; }
    .loading-state .ring { width: 34px; height: 34px; border-radius: 50%; border: 4px solid var(--border); border-top-color: var(--orange); animation: spin .8s linear infinite; margin: 0 auto 14px; }
</style>
</head>
<body>

<div class="ambient-bg"><div class="ambient-blob orange"></div><div class="ambient-blob purple"></div></div>

<div class="profile-topbar">
    <button class="back-btn" id="backBtn" title="Voltar ao mapa"><i class="fa-solid fa-arrow-left"></i></button>
    <h1>Meu perfil</h1>
    <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
</div>

<div id="loadingState" class="loading-state"><div class="ring"></div>Carregando seu perfil...</div>

<div id="profileContent" style="display:none;">

    <div class="profile-hero">
        <div class="avatar">
            <i class="fa-solid fa-user-shield"></i>
            <div class="level-badge" id="levelBadge">1</div>
        </div>
        <h2 id="profileNome">—</h2>
        <p class="email" id="profileEmail">—</p>
        <span class="badge-tag" id="badgeTag" style="display:none;"><i class="fa-solid fa-medal"></i> <span id="badgeLabel"></span></span>
    </div>

    <div class="xp-section">
        <div class="card xp-card">
            <div class="xp-top">
                <span class="label">Progresso para o próximo nível</span>
                <span class="value" id="xpProgressLabel">0 / 0 XP</span>
            </div>
            <div class="xp-bar-track"><div class="xp-bar-fill" id="profileXpBar" style="width:0%;"></div></div>
        </div>
    </div>

    <div class="metrics-grid stagger-in">
        <div class="metric-card card">
            <div class="icon purple"><i class="fa-solid fa-star"></i></div>
            <div class="value" id="metricLevel">1</div>
            <div class="label">Nível</div>
        </div>
        <div class="metric-card card">
            <div class="icon gold"><i class="fa-solid fa-fire"></i></div>
            <div class="value" id="metricStreak">0</div>
            <div class="label">Sequência (dias)</div>
        </div>
        <div class="metric-card card">
            <div class="icon orange"><i class="fa-solid fa-map-location-dot"></i></div>
            <div class="value" id="metricReports">0</div>
            <div class="label">Relatos enviados</div>
        </div>
        <div class="metric-card card">
            <div class="icon green"><i class="fa-solid fa-bolt"></i></div>
            <div class="value" id="metricXp">0</div>
            <div class="label">XP total</div>
        </div>
    </div>

    <p class="member-since" id="memberSince"></p>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i><span id="toastMsg"></span></div>

<script>
window.WESAFE_CONFIG = {
    API_BASE: "",
    HOME_URL: {{ url_for('home')|tojson }},
    LOGIN_URL: {{ url_for('login')|tojson }},
    ENTRADA_URL: {{ url_for('entrada')|tojson }}
};
</script>
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
